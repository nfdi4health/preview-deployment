apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  selector:
    matchLabels:
      name: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        name: {{ .Release.Name }}-frontend
        project: nfdi4health
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: preview
        app.kubernetes.io/component: frontend
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
      - name: frontend
        image: {{ .Values.images.frontend }}
        ports:
          - containerPort: 80
        env:
          - name: API_PASS
            value: http://{{ .Release.Name }}-backend:5000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
  selector:
    name: {{ .Release.Name }}-frontend
